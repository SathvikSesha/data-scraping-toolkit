<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotes</title>
    <style>
        .quote {
            max-width: 800px;
            width: 100%;
            box-sizing: border-box;
        }

        .quote h3 {
            color: rgb(102, 101, 101);
        }

        .quote p {
            color: rgb(53, 2, 2);
        }
    </style>
</head>

<body>
    <h1>Quotes Scrapper</h1>

    <div class="container">
        <button class="scrape-btn">Run Scraper</button>
        <button class="button">Get quotes</button>
        <p class="msg">No quotes</p>
        <div class="quotes"></div>
    </div>
    <div class="emails">
        <input type="text" class="url-input" placeholder="Enter website URL" />
        <button class="email-btn">Extract Emails</button>
    </div>
    <script>
        const btn = document.querySelector(".button");
        const msg = document.querySelector(".msg");
        const quotesContainer = document.querySelector(".quotes");
        const scrapeBtn = document.querySelector(".scrape-btn");
        btn.disabled = true;
        const emailBtn = document.querySelector(".email-btn");
        const urlInput = document.querySelector(".url-input");
        const emailContainer = document.querySelector(".emails");

        emailBtn.addEventListener("click", async () => {
            const url = urlInput.value;

            if (!url) {
                msg.textContent = "Enter a valid URL";
                return;
            }

            msg.textContent = "Extracting emails...";
            emailContainer.innerHTML = "";

            try {
                await fetch("http://localhost:5050/scrape-emails", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ url })
                });

                // 🔥 Fetch extracted emails
                const res = await fetch("http://localhost:5050/emails");
                const emails = await res.json();

                if (emails.length === 0) {
                    msg.textContent = "No emails found";
                    return;
                }

                msg.textContent = "Emails extracted:";

                emails.forEach((e) => {
                    const div = document.createElement("div");
                    div.textContent = e.email;
                    emailContainer.appendChild(div);
                });

            } catch (error) {
                console.log(error);
                msg.textContent = "Error extracting emails";
            }
        });

        scrapeBtn.addEventListener("click", async () => {
            msg.textContent = "Scraping in progress...";

            try {
                const res = await fetch("http://localhost:5050/scrape", {
                    method: "POST"
                });

                const data = await res.json();

                msg.textContent = data.message;
                btn.disabled = false;

            } catch (error) {
                console.log(error);
                msg.textContent = "Scraping failed";
            }
        });

        async function fetchData() {
            try {
                const res = await fetch("http://localhost:5050/quotes");

                if (!res.ok) {
                    msg.textContent = "Failed to fetch data";
                    return [];
                }

                const data = await res.json();
                return data;
            } catch (error) {
                console.log(error);
                msg.textContent = "Error occurred";
                return [];
            }
        }

        btn.addEventListener("click", async (e) => {
            e.preventDefault();
            msg.textContent = "Loading...";
            quotesContainer.innerHTML = "";

            const data = await fetchData();

            if (data.length === 0) {
                msg.textContent = "No quotes found";
                return;
            }

            msg.textContent = "";

            data.forEach((d) => {
                const quote = document.createElement("div");
                quote.classList.add("quote");

                quote.innerHTML = `
                    <h3>${d.author}</h3>
                    <p>${d.quote}</p>
                `;

                quotesContainer.appendChild(quote);
            });
        });

    </script>
</body>

</html>
